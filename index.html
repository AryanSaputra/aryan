<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pencatat Tarawih & Witir</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: 
        radial-gradient(ellipse at bottom, #1a1f3a 0%, #0f172a 70%),
        linear-gradient(135deg, #0f172a 0%, #1a1f3a 100%);
    color: white;
    text-align: center;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    line-height: 1.6;
    position: relative;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
        radial-gradient(2px 2px at 20px 30px, #f5a623, transparent),
        radial-gradient(2px 2px at 40px 70px, #ff6b35, transparent),
        radial-gradient(1px 1px at 90px 40px, #4ecdc4, transparent),
        radial-gradient(1px 1px at 130px 80px, #45b7d1, transparent),
        radial-gradient(2px 2px at 160px 30px, #f9ca24, transparent);
    background-repeat: repeat;
    background-size: 200px 100px;
    animation: starsFloat 50s linear infinite;
    z-index: -1;
    opacity: 0.4;
}

@keyframes starsFloat {
    0% { transform: translateY(0px) rotate(0deg); }
    100% { transform: translateY(-100px) rotate(360deg); }
}

.crescent-moon {
    position: fixed;
    top: 10%;
    right: 10%;
    width: 80px;
    height: 80px;
    border: 4px solid #f4d03f;
    border-radius: 50%;
    box-shadow: 0 0 30px #f4d03f44;
    transform: rotate(-25deg);
    z-index: -1;
    opacity: 0.6;
    animation: moonGlow 4s ease-in-out infinite alternate;
}

@keyframes moonGlow {
    from { box-shadow: 0 0 30px #f4d03f44; }
    to { box-shadow: 0 0 50px #f4d03f88, 0 0 70px #f4d03f44; }
}

h2 {
    font-size: clamp(28px, 8vw, 42px);
    margin-bottom: 12px;
    background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #ec4899 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
    font-weight: 800;
    position: relative;
    animation: titleShimmer 3s ease-in-out infinite;
    text-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
}

@keyframes titleShimmer {
    0%, 100% { background-position: -200% 0; }
    50% { background-position: 200% 0; }
}

h2 {
    background-size: 200% 100% !important;
}

h3 {
    font-size: clamp(16px, 5vw, 20px);
    margin-bottom: 24px;
    background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 700;
    text-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
    letter-spacing: 0.5px;
    text-transform: uppercase;
}

.container {
    background: rgba(30, 41, 59, 0.5);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    padding: clamp(28px, 7vw, 56px);
    border-radius: 32px;
    width: 100%;
    max-width: 950px;
    box-shadow: 
        0 35px 100px rgba(0, 0, 0, 0.6), 
        inset 0 1px 0 rgba(255, 255, 255, 0.15),
        0 0 50px rgba(59, 130, 246, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.15);
    animation: slideUpFloat 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
}

.container::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
    animation: containerShine 3s infinite;
}

@keyframes slideUpFloat {
    from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

@keyframes containerShine {
    0% { left: -100%; }
    100% { left: 100%; }
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeInRow {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

tr {
    animation: fadeInRow 0.4s ease-out;
}

.button-group {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 16px;
    justify-content: center;
    margin-bottom: 28px;
    max-width: 600px;
}

button, select {
    padding: clamp(10px, 3vw, 12px) clamp(15px, 4vw, 20px);
    border: none;
    border-radius: 8px;
    font-size: clamp(13px, 3vw, 15px);
    font-weight: 600;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    flex: 1;
    min-width: 120px;
}

button:hover, select:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(var(--button-glow));
}

button {
    position: relative;
    overflow: hidden;
}

button::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    background: rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
}

button:active::before {
    width: 300px;
    height: 300px;
}

button:active {
    transform: translateY(-1px) scale(0.98);
    transition: transform 0.1s ease;
}

select {
    background: #1e293b;
    color: white;
    border: 2px solid #475569;
    cursor: pointer;
    flex: none;
    min-width: auto;
    width: 100%;
}

select:hover {
    border-color: #64748b;
}

.tarawihBtn {
    --button-glow: 59, 130, 246;
    background: linear-gradient(135deg, #2563eb, #1d4ed8, #1e40af);
    background-size: 200% 200%;
    animation: gradientShift 4s ease infinite;
    color: white;
}

.tarawihBtn:hover {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
}

.witirBtn {
    --button-glow: 139, 92, 246;
    background: linear-gradient(135deg, #7c3aed, #6d28d9, #581c87);
    background-size: 200% 200%;
    animation: gradientShift 4s ease infinite reverse;
    color: white;
}

.witirBtn:hover {
    background: linear-gradient(135deg, #8b5cf6, #7c3aed);
}

.add {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
}

.add:hover {
    background: linear-gradient(135deg, #4ade80, #22c55e);
}

.reset {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: white;
}

.reset:hover {
    background: linear-gradient(135deg, #f87171, #ef4444);
}

label {
    display: block;
    margin-bottom: 10px;
    font-weight: 600;
    color: #e2e8f0;
    font-size: clamp(13px, 3vw, 15px);
    text-align: left;
}

div[id^="opsi"] {
    margin: 20px 0;
    padding: 15px;
    background: rgba(30, 41, 59, 0.5);
    border-radius: 8px;
    border-left: 4px solid #3b82f6;
}

#opsiWitir {
    border-left-color: #8b5cf6;
}

.table-wrapper {
    width: 100%;
    margin-top: 36px;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(59, 130, 246, 0.2);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    animation: tableFadeIn 0.6s ease-out 0.3s both;
}

@keyframes tableFadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

table {
    width: 100%;
    border-collapse: collapse;
    background: rgba(30, 41, 59, 0.7);
    backdrop-filter: blur(20px);
    font-size: clamp(13px, 3vw, 16px);
    border-radius: 16px;
    overflow: hidden;
}

tbody tr:nth-child(even) {
    background: rgba(51, 65, 85, 0.4);
}

tbody tr:hover {
    background: rgba(79, 70, 229, 0.2) !important;
    transform: scale(1.01);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
}

th {
    background: linear-gradient(135deg, rgba(30, 64, 175, 0.9), rgba(109, 40, 217, 0.9));
    backdrop-filter: blur(10px);
    padding: clamp(14px, 3.5vw, 18px) clamp(10px, 2.5vw, 14px);
    font-weight: 700;
    text-transform: uppercase;
    font-size: clamp(12px, 3vw, 14px);
    letter-spacing: 1px;
    color: #f0f9ff;
    position: sticky;
    top: 0;
    z-index: 20;
    border-bottom: 2px solid rgba(255, 255, 255, 0.1);
}

td {
    padding: clamp(16px, 4vw, 18px) clamp(14px, 3.5vw, 18px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    word-break: break-word;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
}

td:hover {
    background: rgba(255, 255, 255, 0.05);
}

tr:last-child td {
    border-bottom: none;
}

.tarawih {
    background: linear-gradient(90deg, #1e40af 0%, #1e3a8a 100%);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.tarawih:hover {
    background: linear-gradient(90deg, #3b82f6 0%, #2563eb 100%);
    transform: scale(1.01);
    box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
}

.witir {
    background: linear-gradient(90deg, #6d28d9 0%, #581c87 100%);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.witir:hover {
    background: linear-gradient(90deg, #8b5cf6 0%, #7c3aed 100%);
    transform: scale(1.01);
    box-shadow: 0 0 12px rgba(139, 92, 246, 0.4);
}

.break {
    background: linear-gradient(90deg, #f59e0b 0%, #d97706 100%);
    color: #1f2937;
    font-weight: bold;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.break:hover {
    background: linear-gradient(90deg, #fbbf24 0%, #f59e0b 100%);
    transform: scale(1.01);
    box-shadow: 0 0 12px rgba(245, 158, 11, 0.4);
}

br {
    display: block;
    margin: 8px 0;
}

/* Tablet & Desktop */
@media (min-width: 768px) {
    body {
        padding: 40px 20px;
    }

    .container {
        padding: 40px;
    }

    button, select {
        min-width: 140px;
        flex: 0 1 auto;
    }

    .button-group {
        gap: 12px;
    }

    table {
        font-size: 15px;
    }
}

/* Large Desktop */
@media (min-width: 1024px) {
    .container {
        max-width: 900px;
    }

    button:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
    }

    .tarawih:hover, .witir:hover, .break:hover {
        transform: scale(1.02);
    }
}

/* Mobile optimization */
@media (max-width: 480px) {
    .button-group {
        grid-template-columns: 1fr;
        gap: 12px;
        margin-bottom: 20px;
    }

    .table-wrapper {
        border-radius: 16px;
        margin-top: 20px;
    }

    table {
        font-size: 13px;
    }

    th {
        padding: 12px 8px;
        font-size: 11px;
    }

    td {
        padding: 10px 8px;
        font-size: 12px;
    }

    body {
        padding: 16px;
    }

    .container {
        padding: 24px;
        border-radius: 20px;
    }

    div[id^="opsi"] {
        padding: 16px;
        border-radius: 12px;
        margin: 18px 0;
    }

    .metode-box {
        flex-direction: column;
        gap: 12px;
        align-items: stretch;
    }

    .metode-box select {
        width: 100%;
        min-width: unset;
    }
}

/* Extra small devices */
@media (max-width: 360px) {
    .container {
        padding: 15px;
    }

    h2 {
        font-size: 20px;
    }

    button, select {
        padding: 10px;
        font-size: 13px;
        margin-bottom: 8px;
    }

    table {
        font-size: 10px;
    }

    th, td {
        padding: 8px 4px;
    }
}

.metode-box {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
}

.metode-box label {
    margin: 0;
    font-weight: 600;
    font-size: clamp(14px, 3.5vw, 16px);
    white-space: nowrap;
}

.metode-box select {
    flex: 1;
    min-width: 160px;
    max-width: 220px;
    padding: clamp(12px, 3vw, 14px) clamp(18px, 4vw, 24px);
    border-radius: 12px;
}

.mode-buttons{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-bottom: 20px;
}

/* Countdown Styles */
.countdown-display {
    text-align: center;
    padding: clamp(32px, 6vw, 52px);
    margin-bottom: 40px;
    background: rgba(15, 23, 42, 0.4);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border-radius: 32px;
    border: 2px solid rgba(59, 130, 246, 0.6);
    box-shadow: 
        0 30px 80px rgba(59, 130, 246, 0.3), 
        0 0 60px rgba(139, 92, 246, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    animation: pulseGlowBig 2.5s ease-in-out infinite alternate, slideUp 1s ease-out;
    position: relative;
    overflow: hidden;
}

.countdown-display::before {
    content: '🕌';
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 32px;
    opacity: 0.3;
    animation: floatIcon 3s ease-in-out infinite;
}

@keyframes floatIcon {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-10px) rotate(5deg); }
}

@keyframes pulseGlowBig {
    from { box-shadow: 0 30px 80px rgba(59, 130, 246, 0.3), 0 0 60px rgba(139, 92, 246, 0.2); }
    to { box-shadow: 0 40px 100px rgba(59, 130, 246, 0.4), 0 0 80px rgba(139, 92, 246, 0.3); }
}

@keyframes pulseGlow {
    from { box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3); }
    to { box-shadow: 0 10px 30px rgba(139, 92, 246, 0.5); }
}

@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

#countdownTitle {
    font-size: clamp(20px, 6vw, 32px);
    margin-bottom: 20px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 700;
}

.timer-display {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
    margin-bottom: 10px;
}

.timer-display span {
    background: linear-gradient(135deg, #1e40af, #7c3aed);
    padding: 15px 20px;
    border-radius: 12px;
    font-size: clamp(18px, 5vw, 28px);
    font-weight: 700;
    min-width: 70px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
    position: relative;
    overflow: hidden;
}

.timer-display span::after {
    content: attr(data-label);
    position: absolute;
    bottom: 5px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.5em;
    font-weight: 500;
    opacity: 0.8;
}

@media (max-width: 480px) {
    .timer-display {
        gap: 10px;
    }
    .timer-display span {
        padding: 12px 15px;
        min-width: 60px;
        font-size: 20px;
    }
}
</style>

</head>

<body>

<div id="lebaranCountdown" class="countdown-container">
  
  <!-- Countdown Section -->
  <div id="countdownSection" class="countdown-display">
<h1 id="countdownTitle">⏳ Menuju Hari Raya Idul Fitri</h1>
    <div id="countdownTimer" class="timer-display">
      <span id="days">00</span>
      <span id="hours">00</span>
      <span id="minutes">00</span>
      <span id="seconds">00</span>
    </div>
    <p id="lebaranMessage" style="display:none; font-size: 1.2em; margin-top: 20px;">🎉 Selamat Idul Fitri! Website ditutup sementara. Maaf lahir batin! 🕌</p>
  </div>

<div class="container">
<h2>Pencatat Tarawih & Witir</h2>
<div class="metode-box">
<label for="metodeRamadan">Pilih Metode:</label>
<select id="metodeRamadan" onchange="gantiMetode()">
<option value="NU">Nahdlatul Ulama</option>
<option value="Muhammadiyah">Muhammadiyah</option>
</select>
</div>
<h3 id="status">Mode: Tarawih</h3>

<div class="mode-buttons">
<button class="tarawihBtn" onclick="modeTarawih()" aria-label="Switch to Tarawih mode">🕌 Tarawih</button>
<button class="witirBtn" onclick="modeWitir()" aria-label="Switch to Witir mode">🌟 Witir</button>
</div>

<div id="opsiTarawih">
<label id="labelHitung">Hitung Tarawih:</label><br>
<select id="modeRakaat">
<option value="1">Per 1 Rakaat</option>
<option value="2">Per 2 Rakaat</option>
</select>
</div>

<div id="opsiWitir" style="display:none">
<label id="labelHitungWitir">Hitung Witir:</label><br>
<select id="modeRakaatWitir">
<option value="1">Per 1 Rakaat</option>
<option value="2">Per 2 Rakaat</option>
</select>
</div>

<button class="add" onclick="tambah()" id="btnTambah" aria-live="polite">➕ Tambah</button>
<button class="reset" onclick="reset()">Reset</button>

<div class="table-wrapper">
<table id="tabel">
<tr>
<th>Salat</th>
<th>Rakaat</th>
<th>Waktu</th>
</tr>
</table>
</div>
</div>

<script>
let metode = "NU"
function gantiMetode(){
    metode = document.getElementById("metodeRamadan").value
    
    rakaatTarawih = 0
    rakaatWitir = 0
    
    document.getElementById("tabel").innerHTML = `
    <tr>
    <th>Sholat</th>
    <th>Rakaat</th>
    <th>Waktu</th>
    </tr>`
}

// Countdown to Idul Fitri
const targetDate = new Date('2026-03-21T06:00:00'); // Website tutup sesuai request

function updateCountdown() {
    const now = new Date();
    const timeLeft = targetDate - now;
    
    if (timeLeft <= 0) {
        document.getElementById('countdownSection').innerHTML = `
            <h1 style="font-size: clamp(24px, 8vw, 48px); background: linear-gradient(135deg, #22c55e, #4ade80); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">🎉 SELAMAT HARI RAYA IDUL FITRI! 🎉</h1>
            <p id="lebaranMessage" style="font-size: 1.4em; margin-top: 20px; color: #4ade80; font-weight: 600;">Website ditutup sementara. Maaf lahir batin! 🕌<br>Selamat Hari Raya Idul Fitri.</p>
        `;
        // Optionally hide main app
        const mainContainer = document.querySelector('.container');
        if (mainContainer) mainContainer.style.display = 'none';
        return;
    }
    
    const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
    const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);
    
    document.getElementById('days').textContent = days.toString().padStart(2, '0');
    document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
    document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
    document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
    
    document.getElementById('days').setAttribute('data-label', 'Hari');
    document.getElementById('hours').setAttribute('data-label', 'Jam');
    document.getElementById('minutes').setAttribute('data-label', 'Menit');
    document.getElementById('seconds').setAttribute('data-label', 'Detik');
}

function cekLebaran() {
    const now = new Date();
    if (now >= targetDate) {
        updateCountdown(); // Triggers celebration
        return;
    }
    updateCountdown();
}

// Start countdown
cekLebaran();
setInterval(updateCountdown, 1000);



// Batasi akses hanya saat Ramadan
function cekRamadan(){
    let sekarang = new Date()

    // Tanggal Ramadan (ubah setiap tahun)
    let mulai = new Date("2026-02-18")
    let selesai = new Date("2026-03-19")

    if(sekarang < mulai || sekarang > selesai){
        document.body.innerHTML = `
        <div style="
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        text-align:center;
        font-family:sans-serif;
        background:#0f172a;
        color:white;
        ">
        <div>
        <h1>🌙 Website hanya tersedia saat bulan Ramadan</h1>
        <p>Silakan kembali lagi saat bulan suci Ramadan.</p>
        </div>
        </div>
        `
    }
}

cekRamadan()

let mode="Tarawih"
let rakaatTarawih=0
let rakaatWitir=0

function waktu(){
    let now=new Date()
    let h=String(now.getHours()).padStart(2,'0')
    let m=String(now.getMinutes()).padStart(2,'0')
    let s=String(now.getSeconds()).padStart(2,'0')
    return h+":"+m+":"+s
}

function modeTarawih(){

        let maksimal = metode === "Muhammadiyah" ? 8 : 20

if(rakaatTarawih >= maksimal){

}
